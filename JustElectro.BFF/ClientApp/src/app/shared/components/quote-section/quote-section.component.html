<!-- Quote Section Start — structura din blog-single.html -->
<div class="quote-section">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="post-content">
                    <div class="post-entry">
                        <blockquote class="wow fadeInUp" data-wow-delay="0.4s">
                            <p>{{ quote }}</p>
                            @if (author) {
                                <cite>— {{ author }}</cite>
                            }
                        </blockquote>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Quote Section End -->
