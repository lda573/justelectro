<div class="company-counter">
  <div class="container">
    <div class="row">
      @for (item of counters; track item.label) {
        <div class="col-lg-3 col-md-6">
          <div class="company-counter-item">
            <div class="counter-content">
              <h3><span class="counter">{{ item.value }}</span>{{ item.suffix }}</h3>
              <p>{{ item.label }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
