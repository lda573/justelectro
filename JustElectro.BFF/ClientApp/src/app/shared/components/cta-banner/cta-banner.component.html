<div class="cta-box">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="cta-content">
          <div class="section-title">
            <h3 class="wow fadeInUp">{{ label }}</h3>
            <h2 class="text-anime-style-3" data-cursor="-opaque">{{ title }}</h2>
          </div>
          <div class="cta-content-body wow fadeInUp" data-wow-delay="0.25s">
            <p>{{ description }}</p>
          </div>
          <div class="cta-content-footer wow fadeInUp" data-wow-delay="0.5s">
            <a [routerLink]="buttonRoute" class="btn-default">{{ buttonText }}</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
