<app-header />

@if (proiect(); as p) {
  <app-page-header
    [title]="p.titleRo"
    [breadcrumbs]="[
      { label: 'acasă', route: '/' },
      { label: 'portofoliu', route: '/portofoliu' },
      { label: p.titleRo }
    ]"
  />
  <div class="container" style="padding: 80px 0;">
    <div class="row">
      <div class="col-lg-8">
        <img [src]="p.image" [alt]="p.titleRo" style="width:100%; border-radius:8px;">
        <h2 style="margin-top:24px;">{{ p.titleRo }}</h2>
        <p>{{ p.categorieLabel }}</p>
      </div>
    </div>
  </div>
} @else {
  <div class="container" style="padding: 100px 0; text-align: center;">
    <h2>Proiect negăsit</h2>
    <a routerLink="/portofoliu" class="btn-default">înapoi la portofoliu</a>
  </div>
}

<app-cta-banner
  label="contact"
  title="Vrei un proiect similar? Hai să vorbim!"
  description="Experții noștri sunt pregătiți să te ajute să implementezi soluția potrivită pentru nevoile tale energetice."
  buttonText="get started"
  buttonRoute="/contact"
/>
<app-testimonials-section />
<app-footer />
