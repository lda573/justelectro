<app-header />

@if (proiect(); as p) {
  <app-page-header
    [title]="getTitle(p)"
    [breadcrumbs]="[
      { label: 'acasă', route: '/' },
      { label: 'portofoliu', route: '/portofoliu' },
      { label: getTitle(p) }
    ]"
  />
  <div class="container" style="padding: 80px 0;">
    <div class="row">
      <div class="col-lg-8">
        <div class="gallery-items">
          <a [href]="getDisplayImageUrl(p)" class="project-image" style="display:block; aspect-ratio: 4 / 3; overflow:hidden; border-radius:12px;">
            <img
              [src]="getDisplayImageUrl(p)"
              [alt]="getTitle(p)"
              style="width:100%; height:100%; object-fit:cover; display:block;"
            >
          </a>

          @for (image of getGalleryImages(p); track $index) {
            <a [href]="getImageUrl(image, 1200)" style="display:none;">
              <img [src]="getImageUrl(image, 1200)" [alt]="getTitle(p)">
            </a>
          }
        </div>
      </div>
      <div class="col-lg-4" style="margin-top: 0;">
        <div class="row g-3">
          @for (image of getGalleryImages(p); track $index) {
            <div class="col-6 col-lg-12">
              <button
                type="button"
                (click)="selectImage(getImageUrl(image, 1200))"
                style="padding:0; border:0; background:transparent; width:100%;"
              >
                <span
                  style="display:block; width:100%; aspect-ratio: 4 / 3; border-radius:10px; overflow:hidden;"
                  [style.outline]="isSelectedImage(getImageUrl(image, 1200)) ? '2px solid #b5d334' : '2px solid transparent'"
                >
                  <img
                    [src]="getImageUrl(image, 420)"
                    [alt]="getTitle(p)"
                    style="width:100%; height:100%; object-fit:cover; display:block; cursor:pointer;"
                  >
                </span>
              </button>
            </div>
          }
        </div>
      </div>
      <div class="col-lg-12" style="margin-top: 24px;">
        <h2 style="margin-top:24px;">{{ getTitle(p) }}</h2>
        <p>{{ p.category }}</p>
        <p style="white-space: pre-line;">{{ getDescription(p) }}</p>
      </div>
    </div>
  </div>
} @else {
  <div class="container" style="padding: 100px 0; text-align: center;">
    <h2>Proiect negăsit</h2>
    <a routerLink="/portofoliu" class="btn-default">înapoi la portofoliu</a>
  </div>
}

<app-cta-banner
  label="contact"
  title="Vrei un proiect similar? Hai să vorbim!"
  description="Experții noștri sunt pregătiți să te ajute să implementezi soluția potrivită pentru nevoile tale energetice."
  buttonText="get started"
  buttonRoute="/contact"
/>
<app-certifications-section />
<app-footer />
