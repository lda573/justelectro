<div class="company-expertise">
  @if (aboutPage()) {
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6">
          <div class="company-expertise-content">
            <div class="section-title">
              <h3 class="wow fadeInUp">ACREDITĂRI ȘI AUTORIZAȚII</h3>
              <h2 class="text-anime-style-3" data-cursor="-opaque">
                {{ heading() }}
              </h2>
            </div>
            <div class="company-expertise-body wow fadeInUp" data-wow-delay="0.25s">
              <p>{{ body() }}</p>
            </div>
            <div class="company-expertise-list wow fadeInUp" data-wow-delay="0.5s">
              <div class="row">
                @for (skill of skills(); track skill) {
                  <div class="col-lg-6 col-md-6">
                    <div class="expertise-item">
                      <i class="fa-solid fa-check"></i> {{ skill }}
                    </div>
                  </div>
                }
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="company-expertise-image">
            <figure class="image-anime reveal">
              <img src="assets/images/about-img-3.jpg" alt="Company expertise">
              <!--<img [src]="imageUrl()" alt="Company expertise">-->
            </figure>
          </div>
          <div class="satisfied-client">
            <div class="satisfied-counter-box">
              <div class="satisfied-client-icon">
                <img src="assets/images/icon-satisfied-client.svg" alt="">
              </div>
              <div class="satisfied-client-content">
                <h3><span class="counter">{{ clientCount() }}</span>+</h3>
                <p>satisfied client</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="container" style="padding: 80px 0"></div>
  }
</div>
