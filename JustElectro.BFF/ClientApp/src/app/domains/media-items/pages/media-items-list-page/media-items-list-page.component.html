<div class="media-items-page">
  <h1>Media Items</h1>
  @if (loading) {
    <p>Loading...</p>
  }
  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (!loading && !error) {
    <div class="grid">
      @for (item of items; track item.id) {
        <app-media-item-card [item]="item"></app-media-item-card>
      }
    </div>
  }
</div>
