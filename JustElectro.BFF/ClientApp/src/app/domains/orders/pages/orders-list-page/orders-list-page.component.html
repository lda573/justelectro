<div class="orders-page">
  <h1>My Orders</h1>
  @if (loading) {
    <p>Loading...</p>
  }
  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (!loading && !error) {
    <div>
      @for (order of orders; track order.id) {
        <app-order-card [order]="order"></app-order-card>
      }
    </div>
  }
</div>
